app-id: io.matt.Basalt
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: basalt

finish-args:
  - --share=network
  - --filesystem=host

modules:
  - name: basalt
    buildsystem: simple
    build-commands:
      - install -Dm755 basalt /app/bin/basalt
    sources:
      - type: file
        path: ../../target/release/basalt
