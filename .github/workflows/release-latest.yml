name: Release Latest

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: release-latest
  cancel-in-progress: true

permissions:
  actions: read
  contents: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libudev-dev \
            libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check
        run: cargo check --locked

      - name: Test
        run: cargo test --locked

      - name: Prepare release metadata
        id: metadata
        run: |
          commit_sha=$(git rev-parse HEAD)
          timestamp=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          timestamp_unix=$(date -u +"%s")
          version=$(sed -nE '/^\[package\]/,/^\[/ s/^[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' Cargo.toml | head -n1)

          mkdir -p builds
          cat > builds/basalt-build-info.json <<EOF
          {
            "version": "$version",
            "commit": "$commit_sha",
            "built_at": "$timestamp",
            "built_at_unix": "$timestamp_unix"
          }
          EOF

      - name: Upload release metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: basalt-build-info
          path: builds/basalt-build-info.json
          if-no-files-found: error

  build-linux:
    needs: validate
    uses: ./.github/workflows/release-linux-deb.yml
    permissions:
      contents: write

  build-macos:
    needs: validate
    uses: ./.github/workflows/release-macos-dmg.yml
    permissions:
      contents: write

  build-windows:
    needs: validate
    uses: ./.github/workflows/release-windows-installer.yml
    permissions:
      contents: write

  publish:
    needs:
      - validate
      - build-linux
      - build-macos
      - build-windows
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create or overwrite latest release
        run: |
          commit_sha=$(git rev-parse HEAD)
          commit_short=$(git rev-parse --short HEAD)
          timestamp=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          if gh release view latest >/dev/null 2>&1; then
            gh release delete latest --yes --cleanup-tag
          fi

          mapfile -d '' release_files < <(find release-artifacts -type f -print0)

          gh release create latest "${release_files[@]}" \
            --target "$commit_sha" \
            --latest \
            --title "Basalt Latest Build ($commit_short)" \
            --notes "Automated Basalt build. Commit: $commit_sha. Built: $timestamp"

          gh release edit latest --draft=false --latest --target "$commit_sha"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
