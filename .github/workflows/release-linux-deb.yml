name: Build Linux amd64 DEB

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to upload built DEB to"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux-amd64-deb:
    runs-on: ubuntu-24.04
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dpkg-dev \
            pkg-config \
            libudev-dev \
            libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Linux amd64 DEB
        run: bash DevUtils/BuildScripts/build-linux-amd64.sh

      - name: Read build metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          source builds/latest-build.env
          echo "artifact_path=$BUILD_ARTIFACT_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload Linux DEB to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ steps.metadata.outputs.artifact_path }}
          overwrite_files: true
          fail_on_unmatched_files: true
