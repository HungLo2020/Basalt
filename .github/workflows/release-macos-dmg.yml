name: Build macOS arm64 DMG

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to upload built macOS DMG to"
        required: true
        type: string
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos-arm64-dmg:
    runs-on: macos-14
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build macOS arm64 DMG
        run: bash DevUtils/BuildScripts/build-macos-arm64.sh

      - name: Read build metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          source builds/latest-build.env
          echo "artifact_path=$BUILD_ARTIFACT_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload macOS DMG to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ steps.metadata.outputs.artifact_path }}
          overwrite_files: true
          fail_on_unmatched_files: true
